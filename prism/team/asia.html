<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Leadership profile for a Prism officer at UNC Charlotte." />
    <title>Prism Leadership Profile</title>
    <style>
      :root {
        --text: #24163a;
        --muted: #5c5072;
        --border: rgba(70, 39, 106, 0.14);
        --surface: rgba(255, 255, 255, 0.88);
        --shadow: 0 18px 40px rgba(49, 26, 76, 0.14);
        --max-width: 840px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.6;
        color: var(--text);
        background:
          radial-gradient(circle at 72% 4%, rgba(34, 197, 94, 0.18), transparent 24%),
          radial-gradient(circle at 98% 20%, rgba(168, 85, 247, 0.2), transparent 20%),
          linear-gradient(180deg, #fff8fb 0%, #fffdf9 42%, #ffffff 100%);
      }
      a { color: inherit; }
      .wrap {
        width: min(calc(100% - 2rem), var(--max-width));
        margin: 0 auto;
        padding: 1.5rem 0 3rem;
      }
      .button {
        display: inline-block;
        padding: 0.85rem 1.15rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        border: 2px solid rgba(31, 22, 48, 0.16);
      }
      .button:hover,
      .button:focus-visible {
        border-color: var(--text);
        outline: none;
      }
      .panel {
        margin-top: 1.5rem;
        padding: clamp(1.5rem, 3vw, 2.5rem);
        border-radius: 2rem;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .tag {
        display: inline-block;
        margin-bottom: 0.9rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        color: #6d28d9;
        background: rgba(139, 92, 246, 0.1);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.9rem;
        font-weight: 700;
      }
      h1 { line-height: 1.1; margin-top: 0; font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 0.75rem; }
      p { color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="wrap" data-member-page="asia">
      <a class="button" href="../about.html">Back to About</a>
      <noscript><p>Enable JavaScript to load this profile.</p></noscript>
      <article class="panel" aria-labelledby="member-name">
        <span class="tag" id="member-role">Leadership</span>
        <h1 id="member-name">Loading profile...</h1>
        <div id="member-bio"></div>
      </article>
    </main>
    <script src="../scripts/team-data.js"></script>
    <script src="../scripts/render-team.js"></script>
  </body>
</html>
